<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midcap 150 Screener</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0f1a;
  --bg-card: #111827;
  --bg-card-hover: #1a2332;
  --border: #1e2a3a;
  --text: #e2e8f0;
  --text-muted: #64748b;
  --text-dim: #475569;
  --green: #10b981;
  --green-bg: rgba(16,185,129,0.08);
  --green-border: rgba(16,185,129,0.2);
  --yellow: #f59e0b;
  --yellow-bg: rgba(245,158,11,0.08);
  --yellow-border: rgba(245,158,11,0.2);
  --blue: #3b82f6;
  --blue-bg: rgba(59,130,246,0.08);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.08);
  --red-border: rgba(239,68,68,0.2);
  --purple: #8b5cf6;
  --font: 'DM Sans', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; }
a { color: var(--blue); text-decoration: none; }

.container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
.header { padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
.header h1 span { color: var(--green); }
.header-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

/* Regime banner */
.regime { padding: 12px 18px; border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 500; }
.regime.bull { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }
.regime.bear { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red); }

/* Metric cards */
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
.metric { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.metric-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
.metric-value { font-size: 26px; font-weight: 700; font-family: var(--mono); letter-spacing: -1px; }
.metric-value.green { color: var(--green); }
.metric-value.yellow { color: var(--yellow); }
.metric-value.red { color: var(--red); }

/* Tabs */
.tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
.tab { padding: 10px 20px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--green); border-bottom-color: var(--green); }
.tab-count { font-size: 11px; background: var(--border); padding: 1px 6px; border-radius: 8px; margin-left: 6px; }

/* Signal cards */
.signals { display: flex; flex-direction: column; gap: 8px; }
.signal-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; display: grid; grid-template-columns: 48px 1fr 1fr 1fr 180px; align-items: center; gap: 16px; transition: background 0.15s; cursor: pointer; }
.signal-card:hover { background: var(--bg-card-hover); }
.signal-card.tier-a { border-left: 3px solid var(--green); }
.signal-card.tier-b { border-left: 3px solid var(--yellow); }
.signal-card.tier-w { border-left: 3px solid var(--text-dim); }

.signal-score { font-size: 22px; font-weight: 700; font-family: var(--mono); text-align: center; }
.signal-score.a { color: var(--green); }
.signal-score.b { color: var(--yellow); }
.signal-score.w { color: var(--text-dim); }

.signal-name { font-weight: 600; font-size: 14px; }
.signal-sector { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.signal-tier { font-size: 10px; font-weight: 600; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-top: 4px; }
.signal-tier.a { background: var(--green-bg); color: var(--green); }
.signal-tier.b { background: var(--yellow-bg); color: var(--yellow); }
.signal-tier.w { background: rgba(100,116,139,0.15); color: var(--text-muted); }

.signal-prices { font-family: var(--mono); font-size: 13px; }
.signal-prices .label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.signal-prices .val { font-weight: 500; }
.signal-prices .target { color: var(--green); }
.signal-prices .stop { color: var(--red); }

.signal-indicators { font-size: 12px; color: var(--text-muted); }
.signal-indicators .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; margin: 2px 2px; font-size: 11px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); }
.signal-indicators .tag.active { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }

.signal-rationale { font-size: 12px; color: var(--text-muted); display: flex; flex-wrap: wrap; gap: 4px; }

/* Sector bar chart */
.sector-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
.sector-name { width: 140px; font-size: 13px; font-weight: 500; flex-shrink: 0; }
.sector-bar-wrap { flex: 1; height: 24px; position: relative; background: rgba(255,255,255,0.02); border-radius: 4px; overflow: hidden; }
.sector-bar { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
.sector-bar.positive { background: var(--green); opacity: 0.6; }
.sector-bar.negative { background: var(--red); opacity: 0.5; position: absolute; right: 50%; }
.sector-val { width: 60px; text-align: right; font-family: var(--mono); font-size: 13px; font-weight: 500; }
.sector-val.positive { color: var(--green); }
.sector-val.negative { color: var(--red); }
.sector-rank { width: 24px; font-size: 12px; color: var(--text-dim); }

/* Trade journal */
.trade-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.trade-table th { text-align: left; padding: 8px 12px; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
.trade-table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); font-family: var(--mono); font-size: 12px; }
.pnl-pos { color: var(--green); }
.pnl-neg { color: var(--red); }

/* Empty state */
.empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
.empty h3 { font-size: 16px; color: var(--text); margin-bottom: 8px; }
.empty p { font-size: 13px; max-width: 400px; margin: 0 auto; }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--text-muted); }
.spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Responsive */
@media (max-width: 768px) {
  .signal-card { grid-template-columns: 40px 1fr; gap: 8px; }
  .signal-prices, .signal-indicators { display: none; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Midcap <span>150</span> Screener</h1>
    <div class="header-sub">MPVS v2 — Momentum + Pullback + Volatility Squeeze + Fundamentals</div>
  </div>
  <div id="app">
    <div class="loading"><div class="spinner"></div>Loading signals...</div>
  </div>
</div>

<script>
const API = '';  // Same origin

const state = {
  signals: [],
  sectors: [],
  regime: null,
  trades: { trades: [], summary: {} },
  date: '',
  tab: 'signals',
  loading: true,
};

async function fetchData() {
  try {
    const [sigRes, secRes, regRes, trRes] = await Promise.all([
      fetch(`${API}/api/signals`).then(r => r.json()),
      fetch(`${API}/api/sectors`).then(r => r.json()),
      fetch(`${API}/api/regime`).then(r => r.json()),
      fetch(`${API}/api/trades`).then(r => r.json()),
    ]);
    state.signals = sigRes.signals || [];
    state.date = sigRes.date || '';
    state.sectors = secRes.sectors || [];
    state.regime = regRes;
    state.trades = trRes;
    state.loading = false;
    render();
  } catch (e) {
    state.loading = false;
    document.getElementById('app').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📡</div>
        <h3>No data yet</h3>
        <p>Run the screener first: <code style="color:var(--green)">python -m webapp.scheduler</code>, then refresh this page.</p>
      </div>`;
  }
}

function render() {
  const app = document.getElementById('app');
  const { signals, sectors, regime, trades, date, tab } = state;

  const aGrade = signals.filter(s => s.tier === 'A');
  const bGrade = signals.filter(s => s.tier === 'B');
  const watch = signals.filter(s => s.tier === 'WATCH');
  const isBull = regime && regime.is_bullish;

  let html = '';

  // Regime banner
  html += `<div class="regime ${isBull ? 'bull' : 'bear'}">
    ${isBull ? '🟢' : '🔴'} Regime: ${isBull ? 'BULLISH — strategy active' : 'BEARISH — no new longs'}
    ${regime ? ` &nbsp;|&nbsp; Index: ₹${Number(regime.index_close||0).toLocaleString()} &nbsp;|&nbsp; 50-DMA: ₹${Number(regime.index_sma50||0).toLocaleString()}` : ''}
    <span style="margin-left:auto;font-size:12px;opacity:0.7">${date}</span>
  </div>`;

  // Metrics
  html += `<div class="metrics">
    <div class="metric"><div class="metric-label">A-Grade</div><div class="metric-value green">${aGrade.length}</div></div>
    <div class="metric"><div class="metric-label">B-Grade</div><div class="metric-value yellow">${bGrade.length}</div></div>
    <div class="metric"><div class="metric-label">Watchlist</div><div class="metric-value">${watch.length}</div></div>
    <div class="metric"><div class="metric-label">Win Rate</div><div class="metric-value ${(trades.summary?.win_rate||0)>=0.5?'green':'yellow'}">${Math.round((trades.summary?.win_rate||0)*100)}%</div></div>
    <div class="metric"><div class="metric-label">Total P&L</div><div class="metric-value ${(trades.summary?.total_pnl||0)>=0?'green':'red'}">₹${Number(trades.summary?.total_pnl||0).toLocaleString()}</div></div>
  </div>`;

  // Tabs
  html += `<div class="tabs">
    <div class="tab ${tab==='signals'?'active':''}" onclick="switchTab('signals')">Signals<span class="tab-count">${aGrade.length+bGrade.length}</span></div>
    <div class="tab ${tab==='watchlist'?'active':''}" onclick="switchTab('watchlist')">Watchlist<span class="tab-count">${watch.length}</span></div>
    <div class="tab ${tab==='sectors'?'active':''}" onclick="switchTab('sectors')">Sectors<span class="tab-count">${sectors.length}</span></div>
    <div class="tab ${tab==='journal'?'active':''}" onclick="switchTab('journal')">Journal<span class="tab-count">${trades.summary?.total||0}</span></div>
  </div>`;

  if (tab === 'signals') {
    html += renderSignals([...aGrade, ...bGrade]);
  } else if (tab === 'watchlist') {
    html += renderSignals(watch.slice(0, 20));
  } else if (tab === 'sectors') {
    html += renderSectors(sectors);
  } else if (tab === 'journal') {
    html += renderJournal(trades);
  }

  app.innerHTML = html;
}

function renderSignals(list) {
  if (!list.length) return `<div class="empty"><div class="empty-icon">📊</div><h3>No signals today</h3><p>The market hasn't produced actionable setups. Check back tomorrow after 4:30 PM.</p></div>`;
  return `<div class="signals">${list.map(s => {
    const tc = s.tier==='A'?'a':s.tier==='B'?'b':'w';
    const tags = (s.rationale||'').split(' + ').map(t => `<span class="tag${t.includes('penalty')?'':' active'}">${t}</span>`).join('');
    const pctTarget = s.close ? (((s.target/s.close)-1)*100).toFixed(1) : '?';
    const pctStop = s.close ? (((s.close-s.stop)/s.close)*100).toFixed(1) : '?';
    return `<div class="signal-card tier-${tc}">
      <div class="signal-score ${tc}">${s.score}</div>
      <div>
        <div class="signal-name">${(s.ticker||'').replace('.NS','')}</div>
        <div class="signal-sector">${s.sector||''} ${s.sector_rank>0?'#'+s.sector_rank:''}</div>
        <span class="signal-tier ${tc}">${s.tier||'?'}-grade</span>
      </div>
      <div class="signal-prices">
        <div><span class="label">Close</span> <span class="val">₹${Number(s.close).toLocaleString()}</span></div>
        <div><span class="label">Target</span> <span class="val target">₹${Number(s.target).toLocaleString()} (+${pctTarget}%)</span></div>
        <div><span class="label">Stop</span> <span class="val stop">₹${Number(s.stop).toLocaleString()} (-${pctStop}%)</span></div>
      </div>
      <div class="signal-indicators">
        <div>RSI ${s.rsi14||'?'} &nbsp; wRSI ${s.weekly_rsi||'?'} &nbsp; BB ${s.bb_rank||'?'}</div>
        <div>R:R ${s.rr} &nbsp; Qty ${s.qty} &nbsp; Risk ₹${Number(s.capital_at_risk||0).toLocaleString()}</div>
      </div>
      <div class="signal-rationale">${tags}</div>
    </div>`;
  }).join('')}</div>`;
}

function renderSectors(sectors) {
  if (!sectors.length) return `<div class="empty"><h3>No sector data</h3></div>`;
  const maxAbs = Math.max(...sectors.map(s => Math.abs(s.avg_return||0)), 0.01);
  return sectors.map((s, i) => {
    const pct = ((s.avg_return||0)*100).toFixed(1);
    const isPos = s.avg_return >= 0;
    const width = Math.abs(s.avg_return||0) / maxAbs * 50;
    return `<div class="sector-row">
      <div class="sector-rank">#${s.rank}</div>
      <div class="sector-name">${s.sector}</div>
      <div class="sector-bar-wrap">
        <div class="sector-bar ${isPos?'positive':'negative'}" style="width:${width}%;${isPos?'margin-left:50%':'margin-left:'+(50-width)+'%'}"></div>
      </div>
      <div class="sector-val ${isPos?'positive':'negative'}">${isPos?'+':''}${pct}%</div>
    </div>`;
  }).join('');
}

function renderJournal(trades) {
  const list = trades.trades || [];
  if (!list.length) return `<div class="empty"><div class="empty-icon">📒</div><h3>No trades logged yet</h3><p>Use the API to log trades: POST /api/trades</p></div>`;
  return `<table class="trade-table">
    <thead><tr><th>Ticker</th><th>Entry</th><th>Exit</th><th>Qty</th><th>P&L</th><th>Return</th><th>Reason</th></tr></thead>
    <tbody>${list.map(t => {
      const pnl = t.pnl || 0;
      return `<tr>
        <td style="font-family:var(--font);font-weight:500">${(t.ticker||'').replace('.NS','')}</td>
        <td>₹${Number(t.entry_price||0).toLocaleString()}<br><span style="color:var(--text-dim);font-size:10px">${t.entry_date||''}</span></td>
        <td>${t.exit_price ? '₹'+Number(t.exit_price).toLocaleString() : '—'}<br><span style="color:var(--text-dim);font-size:10px">${t.exit_date||'open'}</span></td>
        <td>${t.qty||''}</td>
        <td class="${pnl>=0?'pnl-pos':'pnl-neg'}">₹${pnl.toLocaleString()}</td>
        <td class="${pnl>=0?'pnl-pos':'pnl-neg'}">${t.return_pct?((t.return_pct)*100).toFixed(1)+'%':'—'}</td>
        <td style="font-family:var(--font);color:var(--text-muted)">${t.exit_reason||'—'}</td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

function switchTab(t) { state.tab = t; render(); }

fetchData();
setInterval(fetchData, 60000);
</script>
</body>
</html>
